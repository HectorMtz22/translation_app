name: LiveTranscribe
options:
  bundleIdPrefix: com.livetranscribe
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
targets:
  LiveTranscribe:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: LiveTranscribe
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.livetranscribe.app
        PRODUCT_NAME: Live Transcribe
        INFOPLIST_FILE: LiveTranscribe/Info.plist
        CODE_SIGN_ENTITLEMENTS: LiveTranscribe/LiveTranscribe.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: LiveTranscribe/LiveTranscribe.entitlements
